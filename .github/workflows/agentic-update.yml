name: Weekly Agentic Polaris Provider Update

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
    inputs:
      polaris_release:
        description: "Polaris release tag, or latest"
        required: false
        default: "latest"

permissions:
  contents: write
  pull-requests: write

jobs:
  agentic-update:
    runs-on: ubuntu-latest
    container: golang:1.23-bookworm
    timeout-minutes: 90
    env:
      POLARIS_RELEASE: ${{ github.event.inputs.polaris_release || 'latest' }}
      AGENT_MAX_ROUNDS: ${{ vars.AGENT_MAX_ROUNDS || '5' }}
      AGENT_MODEL: ${{ vars.AGENT_MODEL || 'gpt-5.2' }}
      AGENT_REPAIR_COMMAND: ${{ vars.AGENT_REPAIR_COMMAND }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: go mod download
      - name: Run agentic update loop
        run: scripts/agentic_loop.sh
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agentic/polaris-provider-update
          title: "Agentic Polaris provider update"
          commit-message: "Update generated Polaris Terraform provider"
          body: |
            Weekly autonomous update from Apache Polaris OpenAPI specs.

            The workflow ran:
            - `make generate`
            - `make fmt`
            - `make test`
            - `make build`
            - optional GenAI repair rounds until green
          labels: |
            agentic
            polaris
            terraform-provider
      - name: Enable auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number != '' && vars.DISABLE_AUTOMERGE != 'true' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
