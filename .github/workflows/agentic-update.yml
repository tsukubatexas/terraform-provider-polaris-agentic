name: Weekly Agentic Polaris Provider Update

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
    inputs:
      polaris_release:
        description: "Polaris release tag, or latest"
        required: false
        default: "latest"

permissions:
  contents: write
  pull-requests: write

jobs:
  agentic-update:
    runs-on: ubuntu-latest
    container: golang:1.24-bookworm
    timeout-minutes: 90
    services:
      polaris:
        image: apache/polaris:latest
        env:
          POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
        ports:
          - 8181:8181
    env:
      POLARIS_RELEASE: ${{ github.event.inputs.polaris_release || 'latest' }}
      POLARIS_INFRA_MODE: service
      POLARIS_ENDPOINT: http://polaris:8181/api/management/v1
      POLARIS_REALM: POLARIS
      POLARIS_ROOT_CLIENT_ID: root
      POLARIS_ROOT_CLIENT_SECRET: s3cr3t
      AGENT_MAX_ROUNDS: ${{ vars.AGENT_MAX_ROUNDS || '5' }}
      AGENT_MODEL: ${{ vars.AGENT_MODEL || 'gpt-5.2' }}
      AGENT_REPAIR_COMMAND: ${{ vars.AGENT_REPAIR_COMMAND }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      CODEX_HOME: /tmp/codex
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: apt-get update && apt-get install -y --no-install-recommends curl jq unzip ca-certificates
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false
      - run: go mod download
      - run: npm --prefix tools/agent-runtime install
      - name: Authenticate Codex runtime
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          mkdir -p "${CODEX_HOME}"
          printenv OPENAI_API_KEY | npm --prefix tools/agent-runtime exec -- codex login -c 'cli_auth_credentials_store="file"' --with-api-key
      - name: Run agentic update loop
        run: scripts/agentic_loop.sh
      - name: Run final static infra loop
        run: scripts/agentic_infra_loop.sh
      - name: Remove transient agent runtime artifacts
        run: rm -rf tools/agent-runtime/node_modules
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: agentic/polaris-provider-update
          title: "feat(polaris): update generated Terraform provider"
          commit-message: "feat(polaris): update generated Terraform provider"
          body: |
            Weekly autonomous update from Apache Polaris OpenAPI specs.

            The workflow ran:
            - `make generate`
            - `make fmt`
            - `make test`
            - `make build`
            - final static `scripts/test_catalog.sh` loop against a real Apache Polaris service container
            - optional GenAI repair rounds until green
          labels: |
            agentic
            polaris
            terraform-provider
          add-paths: |
            .editorconfig
            .gitattributes
            .gitignore
            .release-please-manifest.json
            AGENTS.md
            CHANGELOG.md
            CODE_OF_CONDUCT.md
            CONTRIBUTING.md
            LICENSE
            Makefile
            MAINTAINERS.md
            README.md
            SECURITY.md
            SUPPORT.md
            cmd/**
            docs/**
            examples/**
            go.mod
            go.sum
            internal/**
            main.go
            release-please-config.json
            scripts/**
            specs/**
            tools/**
      - name: Try to enable auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number != '' && vars.DISABLE_AUTOMERGE != 'true' }}
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: scripts/try_enable_automerge.sh "${PR_NUMBER}" SQUASH
