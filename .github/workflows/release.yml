name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: golang:1.23-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: go mod download
      - run: make generate fmt test
      - name: Build cross-platform provider artifacts
        run: |
          mkdir -p dist
          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            GOOS="${target%_*}" GOARCH="${target#*_}" go build -o "dist/terraform-provider-polaris_${target}" .
            tar -czf "dist/terraform-provider-polaris_${target}.tar.gz" -C dist "terraform-provider-polaris_${target}"
          done
      - name: Create release tag
        id: tag
        run: |
          tag="v0.0.${GITHUB_RUN_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Terraform Provider Polaris ${{ steps.tag.outputs.tag }}
          files: dist/*.tar.gz
          body: |
            Autonomous provider release.

            Built from the current generated Apache Polaris OpenAPI operation registry.
