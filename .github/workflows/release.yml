name: Release Please

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "37 5 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Require Release Please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [[ -n "${RELEASE_PLEASE_TOKEN}" ]]; then
            exit 0
          fi
          echo "::error::RELEASE_PLEASE_TOKEN is required so Release Please PRs trigger protected-branch checks and auto-merge."
          exit 1
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  queue-release-pr:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' && vars.DISABLE_AUTOMERGE != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ca-certificates
      - name: Find pending release PR
        id: find
        run: |
          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --label "autorelease: pending" \
            --head "release-please--branches--main" \
            --json number \
            --jq 'sort_by(.number) | .[0].number // empty')"
          if [[ -z "${pr_number}" ]]; then
            echo "found=false" >> "${GITHUB_OUTPUT}"
            echo "No pending Release Please PR found."
            exit 0
          fi
          {
            echo "found=true"
            echo "number=${pr_number}"
          } >> "${GITHUB_OUTPUT}"
      - name: Validate Release Please PR
        if: ${{ steps.find.outputs.found == 'true' }}
        run: scripts/validate_release_please_pr.sh "${{ steps.find.outputs.number }}"
      - name: Enable auto-merge
        if: ${{ steps.find.outputs.found == 'true' }}
        run: scripts/try_enable_automerge.sh "${{ steps.find.outputs.number }}" SQUASH

  publish-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zip gnupg ca-certificates
      - run: go mod download
      - run: make generate fmt test
      - run: git diff --exit-code
      - name: Build Terraform provider artifacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.TERRAFORM_REGISTRY_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.TERRAFORM_REGISTRY_GPG_PASSPHRASE }}
          REQUIRE_TERRAFORM_REGISTRY_SIGNATURE: "true"
        run: scripts/build_release_artifacts.sh "${{ needs.release-please.outputs.version }}" dist
      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*.zip
            dist/*_manifest.json
            dist/*_SHA256SUMS
            dist/*_SHA256SUMS.sig
