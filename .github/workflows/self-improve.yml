name: Weekly Self Improvement

on:
  schedule:
    - cron: "29 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  self-improve:
    runs-on: ubuntu-latest
    container: golang:1.24-bookworm
    timeout-minutes: 90
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AGENT_MODEL: ${{ vars.AGENT_MODEL || 'gpt-5.2' }}
      AGENT_MAX_ROUNDS: ${{ vars.AGENT_MAX_ROUNDS || '5' }}
      AGENT_REPAIR_COMMAND: ${{ vars.AGENT_REPAIR_COMMAND }}
      GITHUB_TOKEN: ${{ github.token }}
      CODEX_HOME: /tmp/codex
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: apt-get update && apt-get install -y --no-install-recommends git curl jq ca-certificates
      - run: go mod download
      - run: npm --prefix tools/agent-runtime install
      - name: Authenticate Codex runtime
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          mkdir -p "${CODEX_HOME}"
          printenv OPENAI_API_KEY | npm --prefix tools/agent-runtime exec -- codex login -c 'cli_auth_credentials_store="file"' --with-api-key
      - name: Run self-improvement agent
        run: scripts/self_improve.sh
      - name: Remove transient agent runtime artifacts
        run: rm -rf tools/agent-runtime/node_modules
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: agentic/self-improvement
          title: "Self-improve autonomous provider maintenance"
          commit-message: "Self-improve autonomous maintenance loop"
          body: |
            Autonomous self-improvement pass.

            Scope:
            - update pinned agent/runtime/tooling where safe
            - improve generator/provider tests
            - harden GitHub Actions and release automation
            - keep `make generate fmt test build` green
          labels: |
            agentic
            self-improvement
            hardening
          add-paths: |
            .editorconfig
            .gitattributes
            .gitignore
            .release-please-manifest.json
            AGENTS.md
            CHANGELOG.md
            CODE_OF_CONDUCT.md
            CONTRIBUTING.md
            LICENSE
            Makefile
            MAINTAINERS.md
            README.md
            SECURITY.md
            SUPPORT.md
            cmd/**
            docs/**
            examples/**
            go.mod
            go.sum
            internal/**
            main.go
            release-please-config.json
            scripts/**
            specs/**
            tools/**
      - name: Try to enable auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number != '' && vars.DISABLE_AUTOMERGE != 'true' }}
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: scripts/try_enable_automerge.sh "${PR_NUMBER}" SQUASH
