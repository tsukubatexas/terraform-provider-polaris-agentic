name: Monthly Release Train

on:
  schedule:
    - cron: "23 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  monthly-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - name: Require Release Please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [[ -n "${RELEASE_PLEASE_TOKEN}" ]]; then
            exit 0
          fi
          echo "::error::RELEASE_PLEASE_TOKEN is required so Release Please PRs trigger protected-branch checks and auto-merge."
          exit 1
      - name: Prepare release PR
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.event.repository.default_branch }}
      - name: Install release train helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ca-certificates
      - name: Find pending release PR
        id: find
        run: |
          pr_json="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --label "autorelease: pending" \
            --json number,headRefName,headRefOid,title,isDraft \
            --jq 'sort_by(.number) | .[0] // empty')"
          if [[ -z "${pr_json}" ]]; then
            echo "found=false" >> "${GITHUB_OUTPUT}"
            echo "No pending Release Please PR found."
            exit 0
          fi
          is_draft="$(jq -r '.isDraft' <<<"${pr_json}")"
          if [[ "${is_draft}" == "true" ]]; then
            echo "Release PR is draft and must not be merged automatically." >&2
            exit 1
          fi
          {
            echo "found=true"
            echo "number=$(jq -r '.number' <<<"${pr_json}")"
            echo "head_ref=$(jq -r '.headRefName' <<<"${pr_json}")"
            echo "head_sha=$(jq -r '.headRefOid' <<<"${pr_json}")"
            echo "title=$(jq -r '.title' <<<"${pr_json}")"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ steps.find.outputs.found == 'true' }}
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Validate Release Please PR metadata
        if: ${{ steps.find.outputs.found == 'true' }}
        run: scripts/validate_release_please_pr.sh "${{ steps.find.outputs.number }}"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ steps.find.outputs.found == 'true' }}
        with:
          ref: ${{ steps.find.outputs.head_ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        if: ${{ steps.find.outputs.found == 'true' }}
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        if: ${{ steps.find.outputs.found == 'true' }}
        with:
          terraform_wrapper: false
      - name: Install release gate tooling
        if: ${{ steps.find.outputs.found == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck curl jq zip ca-certificates
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
      - name: Validate release PR
        if: ${{ steps.find.outputs.found == 'true' }}
        env:
          POLARIS_INFRA_MODE: docker
          AGENT_MAX_ROUNDS: "1"
        run: |
          go mod download
          scripts/check_release_please_config.sh
          scripts/check_actions_pinned.sh
          bash -n scripts/*.sh
          shellcheck scripts/*.sh
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "${actionlint_bin}" -color=false .github/workflows/*.yml
          scripts/agentic_infra_loop.sh
      - name: Merge or queue release PR
        id: merge
        if: ${{ steps.find.outputs.found == 'true' }}
        run: |
          if ! merge_output="$(gh pr merge "${{ steps.find.outputs.number }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --squash \
              --auto \
              --delete-branch \
              --match-head-commit "${{ steps.find.outputs.head_sha }}" \
              --subject "${{ steps.find.outputs.title }}" \
              --body "Monthly controlled release train." 2>&1)"; then
            echo "${merge_output}"
            if grep -Eq "Auto merge is not allowed|base branch policy prohibits" <<<"${merge_output}"; then
              echo "merged=false" >> "${GITHUB_OUTPUT}"
              echo "Release PR is validated, but branch protection or repository settings require a human merge."
              exit 0
            fi
            exit 1
          fi
          sleep 10
          state="$(gh pr view "${{ steps.find.outputs.number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json state \
            --jq '.state')"
          if [[ "${state}" == "MERGED" ]]; then
            echo "merged=true" >> "${GITHUB_OUTPUT}"
          else
            echo "merged=false" >> "${GITHUB_OUTPUT}"
            echo "Release PR is validated and queued for auto-merge; publishing waits for branch protection."
          fi
      - name: Publish GitHub release
        id: publish
        if: ${{ steps.find.outputs.found == 'true' && steps.merge.outputs.merged == 'true' }}
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.event.repository.default_branch }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ steps.publish.outputs.release_created == 'true' }}
        with:
          ref: ${{ steps.publish.outputs.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        if: ${{ steps.publish.outputs.release_created == 'true' }}
        with:
          go-version-file: go.mod
      - name: Build release assets
        if: ${{ steps.publish.outputs.release_created == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip gnupg ca-certificates
          go mod download
          make generate fmt test
          git diff --exit-code
          scripts/build_release_artifacts.sh "${{ steps.publish.outputs.version }}" dist
        env:
          GPG_PRIVATE_KEY: ${{ secrets.TERRAFORM_REGISTRY_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.TERRAFORM_REGISTRY_GPG_PASSPHRASE }}
          REQUIRE_TERRAFORM_REGISTRY_SIGNATURE: "true"
      - name: Upload release assets
        if: ${{ steps.publish.outputs.release_created == 'true' }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.publish.outputs.tag_name }}
          files: |
            dist/*.zip
            dist/*_manifest.json
            dist/*_SHA256SUMS
            dist/*_SHA256SUMS.sig
