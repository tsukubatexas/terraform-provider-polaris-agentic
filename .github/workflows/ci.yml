name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container: golang:1.24-bookworm
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: apt-get update && apt-get install -y --no-install-recommends shellcheck curl jq ca-certificates
      - run: go mod download
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
      - run: shellcheck scripts/*.sh
      - run: scripts/check_release_please_config.sh
      - run: scripts/check_actions_pinned.sh
      - run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "${actionlint_bin}" -color=false .github/workflows/*.yml
      - run: make generate fmt test build
      - run: scripts/smoke_agent_command_path.sh
      - run: scripts/smoke_agentic_loop.sh
      - run: scripts/smoke_agentic_infra_loop.sh
      - run: scripts/smoke_quarterly_cleanup.sh
      - run: scripts/smoke_self_improve_loop.sh
      - run: scripts/smoke_release_matrix.sh
      - run: scripts/check_adr_updates.sh
      - run: scripts/check_static_coverage.sh
      - run: git diff --exit-code
