name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    container: golang:1.23-bookworm
    steps:
      - uses: actions/checkout@v4
      - run: go mod download
      - run: make generate fmt test build
      - run: scripts/smoke_agentic_infra_loop.sh
      - run: scripts/smoke_quarterly_cleanup.sh
      - run: scripts/smoke_release_matrix.sh
      - run: scripts/check_adr_updates.sh
      - run: scripts/check_static_coverage.sh
      - run: git diff --exit-code
