name: Release PR Auto-Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional Release Please PR number. If omitted, the pending release PR is used.
        required: false
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  enable-release-pr-automerge:
    if: >-
      ${{
        vars.DISABLE_AUTOMERGE != 'true' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event.pull_request.head.ref == 'release-please--branches--main' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.draft == false &&
            contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
          )
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ca-certificates
      - name: Require Release Please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [[ -n "${RELEASE_PLEASE_TOKEN}" ]]; then
            exit 0
          fi
          echo "::error::RELEASE_PLEASE_TOKEN is required for Release Please auto-merge."
          exit 1
      - name: Resolve Release Please PR
        id: pr
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number || '' }}
        run: |
          pr_number="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [[ -z "${pr_number}" ]]; then
            pr_number="$(gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --label "autorelease: pending" \
              --head "release-please--branches--main" \
              --json number \
              --jq 'sort_by(.number) | .[0].number // empty')"
          fi
          if [[ -z "${pr_number}" ]]; then
            echo "No pending Release Please PR found."
            exit 0
          fi
          echo "number=${pr_number}" >> "${GITHUB_OUTPUT}"
      - name: Validate Release Please PR
        if: ${{ steps.pr.outputs.number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: scripts/validate_release_please_pr.sh "${{ steps.pr.outputs.number }}"
      - name: Enable auto-merge
        if: ${{ steps.pr.outputs.number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: scripts/try_enable_automerge.sh "${{ steps.pr.outputs.number }}" SQUASH
