name: Quarterly Cleanup Build

on:
  schedule:
    - cron: "19 3 1 */3 *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  close-obsolete-autonomous-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install hygiene dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ca-certificates
      - name: Close obsolete autonomous PRs before cleanup
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_HYGIENE_STALE_DAYS: ${{ vars.PR_HYGIENE_STALE_DAYS || '14' }}
          PR_HYGIENE_FAILED_DAYS: ${{ vars.PR_HYGIENE_FAILED_DAYS || '3' }}
        run: scripts/autonomous_pr_hygiene.sh

  quarterly-cleanup:
    needs: close-obsolete-autonomous-prs
    runs-on: ubuntu-latest
    container: golang:1.24-bookworm
    timeout-minutes: 120
    services:
      polaris:
        image: apache/polaris:latest
        env:
          POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
        ports:
          - 8181:8181
    env:
      POLARIS_INFRA_MODE: service
      POLARIS_ENDPOINT: http://polaris:8181/api/management/v1
      POLARIS_REALM: POLARIS
      POLARIS_ROOT_CLIENT_ID: root
      POLARIS_ROOT_CLIENT_SECRET: s3cr3t
      AGENT_MAX_ROUNDS: ${{ vars.QUARTERLY_AGENT_MAX_ROUNDS || vars.AGENT_MAX_ROUNDS || '4' }}
      AGENT_MODEL: ${{ vars.AGENT_MODEL || 'gpt-5.2' }}
      AGENT_REPAIR_COMMAND: ${{ vars.AGENT_REPAIR_COMMAND }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      CODEX_HOME: /tmp/codex
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: apt-get update && apt-get install -y --no-install-recommends curl jq unzip ca-certificates git
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - run: go mod download
      - run: npm --prefix tools/agent-runtime install
      - name: Authenticate Codex runtime
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          mkdir -p "${CODEX_HOME}"
          printenv OPENAI_API_KEY | npm --prefix tools/agent-runtime exec -- codex login -c 'cli_auth_credentials_store="file"' --with-api-key
      - name: Run quarterly cleanup loop
        run: scripts/quarterly_cleanup.sh
      - name: Run final static infra loop
        run: scripts/agentic_infra_loop.sh
      - name: Remove transient agent runtime artifacts
        run: rm -rf tools/agent-runtime/node_modules
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: agentic/quarterly-cleanup
          title: "Quarterly cleanup and hardening"
          commit-message: "Run quarterly cleanup and hardening"
          body: |
            Quarterly autonomous cleanup and hardening pass.

            The workflow ran:
            - dependency and lockfile cleanup
            - `make generate`
            - `make fmt`
            - `make test`
            - `make build`
            - ADR and static coverage guards
            - autonomous PR hygiene smoke coverage
            - final static real-Polaris infra loop
          labels: |
            agentic
            cleanup
            hardening
          add-paths: |
            .editorconfig
            .gitattributes
            .gitignore
            .release-please-manifest.json
            AGENTS.md
            CHANGELOG.md
            CODE_OF_CONDUCT.md
            CONTRIBUTING.md
            LICENSE
            Makefile
            MAINTAINERS.md
            README.md
            SECURITY.md
            SUPPORT.md
            cmd/**
            docs/**
            examples/**
            go.mod
            go.sum
            internal/**
            main.go
            release-please-config.json
            scripts/**
            specs/**
            tools/**
      - name: Try to enable auto-merge
        if: ${{ steps.cpr.outputs.pull-request-number != '' && vars.DISABLE_AUTOMERGE != 'true' }}
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: scripts/try_enable_automerge.sh "${PR_NUMBER}" SQUASH

  close-obsolete-autonomous-prs-after-cleanup:
    needs:
      - close-obsolete-autonomous-prs
      - quarterly-cleanup
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install hygiene dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ca-certificates
      - name: Close obsolete autonomous PRs after cleanup
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_HYGIENE_STALE_DAYS: ${{ vars.PR_HYGIENE_STALE_DAYS || '14' }}
          PR_HYGIENE_FAILED_DAYS: ${{ vars.PR_HYGIENE_FAILED_DAYS || '3' }}
        run: scripts/autonomous_pr_hygiene.sh
