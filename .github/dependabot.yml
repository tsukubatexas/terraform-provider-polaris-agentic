version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:21"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "tsukubatexas"
    labels:
      - dependencies
      - go
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:31"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci(deps)"
    reviewers:
      - "tsukubatexas"
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/tools/agent-runtime"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:41"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "tsukubatexas"
    labels:
      - dependencies
      - agent
    groups:
      agent-runtime:
        patterns:
          - "*"
