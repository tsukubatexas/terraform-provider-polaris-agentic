name: Feature request
description: Suggest a provider, generator, workflow, or documentation improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: release-impact
    attributes:
      label: Release impact
      options:
        - label: This likely needs an ADR.
        - label: This likely needs real Polaris test coverage.
