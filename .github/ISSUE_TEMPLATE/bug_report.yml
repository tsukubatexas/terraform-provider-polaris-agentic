name: Bug report
description: Report a reproducible provider, generator, or workflow bug.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, Terraform state, or real cloud account identifiers.
  - type: input
    id: version
    attributes:
      label: Provider version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: polaris
    attributes:
      label: Apache Polaris version
      placeholder: apache-polaris-1.4.1
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or Terraform configuration.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
